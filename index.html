<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyección Cuarto Turno</title>
<style>
body{font-family:sans-serif;background:#f4f6f9;padding:20px}
.container{max-width:1000px;margin:auto}
input,button{padding:8px;margin-top:5px}
button{cursor:pointer}
.cal{width:100%;border-collapse:collapse;margin-top:20px}
.cal th,.cal td{border:1px solid #ddd;padding:6px;text-align:center}
.cal th{background:#185FA5;color:#fff}
.pill{padding:2px 6px;border-radius:4px;font-size:12px}
.l{background:#ede9fe}
.n{background:#1e293b;color:#93c5fd}
.o{color:#aaa}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px}
</style>
</head>
<body>

<div class="container">
  <h2>Proyección Cuarto Turno</h2>

  <label>Fecha inicio ciclo</label><br>
  <input type="date" id="start-date"><br>

  <label>Número de turnos</label><br>
  <input type="number" id="num-turnos" value="4"><br>

  <button onclick="configurar()">Configurar turnos</button>

  <div id="config"></div>

  <button onclick="proyectar()">Proyectar</button>

  <div class="nav">
    <button onclick="cambiarMes(-1)">⬅ Mes anterior</button>
    <h3 id="mes-titulo"></h3>
    <button onclick="cambiarMes(1)">Mes siguiente ➡</button>
  </div>

  <button onclick="exportCSV()">Exportar CSV</button>

  <div id="calendario"></div>
</div>

<script>
let proyeccion = {};
let baseDate;
let currentMonthOffset = 0;

const ciclo = ['L','N','O','O'];

function configurar(){
  const n = document.getElementById('num-turnos').value;
  let html='';

  for(let i=0;i<n;i++){
    html+=`
    <div>
      <h4>Turno ${i+1}</h4>
      <input id="p-${i}" placeholder="Personas separadas por coma">
      <select id="f-${i}">
        <option value="0">Largo</option>
        <option value="1">Noche</option>
        <option value="2">Libre</option>
        <option value="3">Libre</option>
      </select>
    </div>`;
  }

  document.getElementById('config').innerHTML=html;
}

function proyectar(){
  const start = document.getElementById('start-date').value;
  if(!start) return alert("Define fecha inicio");

  baseDate = new Date(start);
  proyeccion = {};

  const n = document.getElementById('num-turnos').value;

  for(let i=0;i<n;i++){
    const personas = document.getElementById(`p-${i}`).value.split(',').map(x=>x.trim()).filter(Boolean);
    const fase = parseInt(document.getElementById(`f-${i}`).value);

    personas.forEach(p=>{
      proyeccion[p] = [];

      for(let d=0; d<365; d++){
        const fecha = new Date(baseDate);
        fecha.setDate(baseDate.getDate()+d);

        const estado = ciclo[(d + fase) % 4];

        proyeccion[p].push({
          fecha,
          estado
        });
      }
    });
  }

  currentMonthOffset = 0;
  render();
}

function cambiarMes(offset){
  currentMonthOffset += offset;
  render();
}

function render(){
  if(!baseDate) return;

  const fechaRef = new Date(baseDate);
  fechaRef.setMonth(baseDate.getMonth()+currentMonthOffset);

  const mes = fechaRef.getMonth();
  const año = fechaRef.getFullYear();

  document.getElementById('mes-titulo').innerText =
    fechaRef.toLocaleString('es',{month:'long',year:'numeric'});

  const diasMes = new Date(año, mes+1, 0).getDate();

  let html='<table class="cal"><tr><th>Persona</th>';

  for(let d=1;d<=diasMes;d++){
    html+=`<th>${d}</th>`;
  }

  html+='</tr>';

  Object.entries(proyeccion).forEach(([persona, arr])=>{
    html+=`<tr><td>${persona}</td>`;

    for(let d=1;d<=diasMes;d++){
      const fecha = new Date(año, mes, d);

      const item = arr.find(x =>
        x.fecha.toDateString() === fecha.toDateString()
      );

      if(item){
        if(item.estado==='L') html+=`<td><span class="pill l">L</span></td>`;
        else if(item.estado==='N') html+=`<td><span class="pill n">N</span></td>`;
        else html+=`<td><span class="pill o">·</span></td>`;
      } else {
        html+=`<td></td>`;
      }
    }

    html+='</tr>';
  });

  html+='</table>';

  document.getElementById('calendario').innerHTML = html;
}

function exportCSV(){
  let rows = [['Persona','Fecha','Turno']];

  Object.entries(proyeccion).forEach(([p, arr])=>{
    arr.forEach(d=>{
      rows.push([
        p,
        d.fecha.toISOString().slice(0,10),
        d.estado
      ]);
    });
  });

  const csv = '\uFEFF' + rows.map(r=>r.join(';')).join('\n');
  const blob = new Blob([csv]);
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href=url;
  a.download='proyeccion.csv';
  a.click();
}
</script>

</body>
</html>
